# ============================================================
# Observer Agent - Configuracao como codigo
# ============================================================
# Este arquivo define os parametros operacionais do Observer Agent.
# Eh lido pelo notebook pipeline/notebooks/observer/collect_and_fix.py
# via pipeline_lib.agent.observer.config.load_observer_config().
#
# Hierarquia de prioridade (maior -> menor):
#   1. Widgets Databricks (override manual via UI ou notebook_params)
#   2. Este arquivo YAML
#   3. Defaults hardcoded em ObserverConfig
#
# Para editar: commit + push -> CD sync Databricks Repo automaticamente.
# ============================================================

observer:
  # ---------- LLM ----------
  llm_provider: anthropic
  llm_model: claude-opus-4-20250514
  llm_max_tokens: 16000

  # ---------- Git ----------
  git_provider: github
  base_branch: dev

  # ---------- Resilience ----------
  # Retries em chamadas a LLM/Git providers (exponential backoff)
  max_retries: 3

  # ---------- Dedup ----------
  # Janela em horas para considerar um diagnostico duplicado.
  # Dentro da janela, mesmo erro (hash SHA-256 igual) nao gera PR novo.
  dedup_window_hours: 24

  # ---------- Operacional ----------
  # Dry-run: diagnostica mas NAO cria PR (util para staging/debug).
  # Pode ser sobrescrito via widget ou notebook_params.
  dry_run: false

  # Confianca minima do LLM para criar PR (0.0 = sempre cria).
  # Ex: 0.5 = so cria PR se confidence >= 50%.
  confidence_threshold: 0.0

  # Limite diario de tokens por Observer job (0 = sem limite).
  # Reservado para implementacao futura — nao aplicado ainda.
  max_tokens_per_day: 0
