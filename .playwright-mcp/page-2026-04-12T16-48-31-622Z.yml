          - generic [ref=e243]:
            - heading "Solucao de problemas" [level=2] [ref=e244]: Solucao de problemas
            - generic [ref=e246]:
              - generic [ref=e250]:
                - paragraph [ref=e251]: "GitHub: PermissionDenied / Access not granted"
                - paragraph [ref=e252]: Voce esta usando um Fine-grained token (github_pat_*). Gere um Classic PAT (ghp_*) com scope 'repo' em github.com/settings/tokens.
              - generic [ref=e256]:
                - paragraph [ref=e257]: "S3: Access Denied / 403 Forbidden"
                - paragraph [ref=e258]: O IAM user nao tem permissao pra criar buckets. Verifique que a Access Key tem policies de S3 (PutObject, CreateBucket, etc).
              - generic [ref=e262]:
                - paragraph [ref=e263]: "Databricks: Authorization header is invalid"
                - paragraph [ref=e264]: Token Databricks expirado ou invalido. Gere um novo em User Settings > Developer > Access Tokens no workspace.
              - generic [ref=e268]:
                - paragraph [ref=e269]: "Catalog: Metastore storage root URL does not exist"
                - paragraph [ref=e270]: O metastore trial nao tem storage root configurado. O deploy cria automaticamente um Storage Credential + External Location. Se falhar, verifique que a IAM role tem acesso ao S3 bucket.
              - generic [ref=e274]:
                - paragraph [ref=e275]: "Workflow: Invalid quartz_cron_expression"
                - paragraph [ref=e276]: "O schedule usa Quartz cron (6 campos), nao Unix cron (5 campos). Formato: '0 0 6 * * ?' (segundos minutos hora dia mes dia-da-semana). O deploy converte automaticamente."
              - generic [ref=e280]:
                - paragraph [ref=e281]: "Pipeline run: INTERNAL_ERROR"
                - paragraph [ref=e282]: O pipeline foi provisionado mas os dados de entrada (parquet no S3) podem nao existir ainda. Faca upload dos dados em s3://bucket/bronze/ e re-trigger o job no Databricks.
