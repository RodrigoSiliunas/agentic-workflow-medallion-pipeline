services:
  backend:
    build: .
    container_name: namastex-backend
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/namastex
      REDIS_URL: redis://redis:6379/0
      OMNI_API_URL: http://omni:8882/api/v2
      CORS_ORIGINS: '["http://localhost:3000"]'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 3
    networks:
      - namastex-net
      - omni-net

  frontend:
    build: ../frontend
    container_name: namastex-frontend
    ports:
      - "3000:3000"
    environment:
      # Browser acessa localhost:8000, nao o hostname interno Docker
      NUXT_PUBLIC_API_BASE: http://localhost:8000/api/v1
      NUXT_PUBLIC_MOCK_MODE: "false"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/"]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 3
    networks:
      - namastex-net

  postgres:
    image: postgres:17-alpine
    container_name: namastex-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: namastex
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - namastex-net

  redis:
    image: redis:7-alpine
    container_name: namastex-redis
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - namastex-net

  omni:
    build:
      context: .
      dockerfile: omni.Dockerfile
    container_name: namastex-omni
    ports:
      - "8882:8882"
    environment:
      OMNI_PORT: "8882"
      OMNI_API_KEY: ${OMNI_API_KEY:?Set OMNI_API_KEY in .env}
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/omni
    volumes:
      - omnidata:/home/omni/.omni/data
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - namastex-net
      - omni-net
    restart: unless-stopped

volumes:
  pgdata:
  omnidata:

networks:
  namastex-net:
    driver: bridge
  omni-net:
    driver: bridge
