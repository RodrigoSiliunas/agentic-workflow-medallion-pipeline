services:
  postgres:
    image: postgres:17-alpine
    container_name: namastex-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: namastex
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: namastex-redis
    ports:
      - "6379:6379"

volumes:
  pgdata:
