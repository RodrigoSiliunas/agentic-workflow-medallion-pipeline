services:
  backend:
    build:
      context: ../..
      dockerfile: platform/backend/Dockerfile
    container_name: flowertex-backend
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/flowertex
      REDIS_URL: redis://redis:6379/0
      OMNI_API_URL: http://omni:8882/api/v2
      CORS_ORIGINS: '["http://localhost:3000"]'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 3
    networks:
      - flowertex-net
      - omni-net

  frontend:
    build: ../frontend
    container_name: flowertex-frontend
    ports:
      - "3000:3000"
    environment:
      # Browser acessa localhost:8000, nao o hostname interno Docker
      NUXT_PUBLIC_API_BASE: http://localhost:8000/api/v1
      NUXT_PUBLIC_MOCK_MODE: "false"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/"]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 3
    networks:
      - flowertex-net

  postgres:
    image: postgres:17-alpine
    container_name: flowertex-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: flowertex
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - flowertex-net

  redis:
    image: redis:7-alpine
    container_name: flowertex-redis
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - flowertex-net

  omni:
    build:
      context: .
      dockerfile: omni.Dockerfile
    container_name: flowertex-omni
    ports:
      - "8882:8882"
    environment:
      OMNI_PORT: "8882"
      OMNI_API_KEY: ${OMNI_API_KEY:?Set OMNI_API_KEY in .env}
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/omni
    volumes:
      - omnidata:/home/omni/.omni/data
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - flowertex-net
      - omni-net
    restart: unless-stopped

  # ============================================================================
  # OPCIONAL — Self-hosted LLM via Ollama (profile: gpu)
  # Requer NVIDIA Container Toolkit + GPU local. Ative com:
  #   docker compose --profile gpu up
  # ============================================================================
  ollama:
    image: ollama/ollama:latest
    container_name: flowertex-ollama
    profiles: [gpu]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_KEEP_ALIVE: "30m"        # Manter modelo em VRAM 30min apos ultima request
      OLLAMA_NUM_PARALLEL: "1"         # 3070 8GB = 1 request por vez
      OLLAMA_MAX_LOADED_MODELS: "1"    # 1 model em VRAM por vez (swap se trocar)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - flowertex-net
    restart: unless-stopped

  ollama-init:
    image: ollama/ollama:latest
    container_name: flowertex-ollama-init
    profiles: [gpu]
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "ollama pull qwen3.5:9b && ollama pull gemma4:e2b && echo 'init done'"
    environment:
      OLLAMA_HOST: http://ollama:11434
    networks:
      - flowertex-net
    restart: "no"

  # ============================================================================
  # OPCIONAL — ngrok tunnel pra expor Ollama publicamente (profile: tunnel)
  # Requer NGROK_AUTHTOKEN no .env. Ative junto com gpu:
  #   docker compose --profile gpu --profile tunnel up
  # URL publica visivel em http://localhost:4040
  # ============================================================================
  ngrok:
    image: ngrok/ngrok:latest
    container_name: flowertex-ngrok
    profiles: [tunnel]
    ports:
      - "4040:4040"   # ngrok inspector UI
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN:?Set NGROK_AUTHTOKEN in .env}
    command:
      - "http"
      - "ollama:11434"
      - "--log=stdout"
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - flowertex-net
    restart: unless-stopped

volumes:
  pgdata:
  omnidata:
  ollama_data:

networks:
  flowertex-net:
    driver: bridge
  omni-net:
    driver: bridge
