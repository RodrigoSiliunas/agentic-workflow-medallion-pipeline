services:
  backend:
    build: .
    container_name: namastex-backend
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - namastex-net
      - omni-net

  postgres:
    image: postgres:17-alpine
    container_name: namastex-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: namastex
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - namastex-net

  redis:
    image: redis:7-alpine
    container_name: namastex-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - namastex-net

volumes:
  pgdata:

networks:
  namastex-net:
    driver: bridge
  omni-net:
    driver: bridge
    # Omni se conecta nessa rede — isolado do exterior
