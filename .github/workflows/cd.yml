name: CD — Deploy to Databricks

on:
  push:
    branches: [main]
    paths:
      - "observer-framework/**"
      - "pipelines/**"
      - ".github/workflows/cd.yml"

# Garante que apenas um deploy roda por vez
concurrency:
  group: databricks-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Sync Databricks Repo
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Databricks SDK
        run: pip install databricks-sdk

      # O Databricks Repo espelha o repo Git inteiro, entao sincronizar
      # o branch main atualiza observer-framework/ e pipelines/ de uma vez.
      - name: Sync Databricks Repo
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          python -c "
          from databricks.sdk import WorkspaceClient
          import os

          w = WorkspaceClient(
              host=os.environ['DATABRICKS_HOST'],
              token=os.environ['DATABRICKS_TOKEN'],
          )

          for repo in w.repos.list():
              if 'agentic-workflow-medallion-pipeline' in (repo.path or ''):
                  w.repos.update(repo_id=repo.id, branch='main')
                  print(f'Repo atualizado: {repo.path}')
                  break
          else:
              print('ERRO: Repo nao encontrado no workspace')
              exit(1)
          "

      - name: Verify Deployment
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          python -c "
          from databricks.sdk import WorkspaceClient
          import os

          w = WorkspaceClient(
              host=os.environ['DATABRICKS_HOST'],
              token=os.environ['DATABRICKS_TOKEN'],
          )

          for repo in w.repos.list():
              if 'agentic-workflow-medallion-pipeline' in (repo.path or ''):
                  print(f'Repo: {repo.path}')
                  print(f'Branch: {repo.branch}')
                  print(f'Head commit: {repo.head_commit_id}')
                  break

          # Verifica que os jobs existem
          for name in ['medallion_pipeline_whatsapp', 'workflow_observer_agent']:
              jobs = list(w.jobs.list(name=name))
              if jobs:
                  print(f'Job {name}: {jobs[0].job_id} ({len(jobs[0].settings.tasks)} tasks)')
              else:
                  print(f'WARN: Job {name} nao encontrado')

          print('Deploy concluido com sucesso!')
          "

      - name: Post Deploy Summary
        if: success()
        run: |
          echo "### Databricks Deploy" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** main" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Sync:** observer-framework/ + pipelines/" >> $GITHUB_STEP_SUMMARY
          echo "- **Workspace:** ${{ secrets.DATABRICKS_HOST }}" >> $GITHUB_STEP_SUMMARY
