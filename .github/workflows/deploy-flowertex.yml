name: Deploy Flowertex

on:
  workflow_run:
    workflows: ["Release Flowertex"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (default: main)"
        required: false
        default: "main"

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    name: SSH deploy → Hostinger
    runs-on: ubuntu-latest
    # Quando dispara via workflow_run, so prossegue se o Release passou.
    # Quando dispara via workflow_dispatch, sempre roda.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Resolve image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              echo "tag=${{ github.event.inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
              echo "tag=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: SSH + docker compose pull/up
        uses: appleboy/ssh-action@v1.2.0
        env:
          # Forward o GITHUB_TOKEN efemero pra o session SSH usar como creds ghcr.io.
          # Mesmo padrao usado pelos outros apps do VPS (voxflow/whiz-buddy): cada
          # deploy reescreve /root/.docker/config.json com o token ativo do workflow,
          # que tem read:packages do proprio repo. Tokens ghs_* expiram em ~1h.
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_TAG: ${{ steps.tag.outputs.tag }}
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          timeout: 60s
          # Aumentado pra 10m: omni leva ate 3min pra subir (pgserve install +
          # pm2 spawn) e o backend depende dele via service_healthy.
          command_timeout: 10m
          envs: GHCR_USERNAME,GHCR_TOKEN,IMAGE_TAG
          script: |
            set -euo pipefail
            cd /opt/flowertex

            # Login ghcr.io com o token efemero do workflow (precisa pra pull
            # dos packages flowertex-{backend,frontend} privados do mesmo repo).
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin

            # Atualiza IMAGE_TAG no .env
            sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=${IMAGE_TAG}|" .env

            # Gera OMNI_API_KEY automaticamente se ainda nao existir no .env.
            # Compose ${OMNI_API_KEY:?...} aborta o pull se faltar — manter
            # idempotente pro primeiro deploy depois do merge.
            if ! grep -q '^OMNI_API_KEY=' .env; then
                NEW_KEY="omni_sk_$(openssl rand -hex 16)"
                echo "OMNI_API_KEY=$NEW_KEY" >> .env
                echo "OMNI_API_KEY gerada: ${NEW_KEY:0:20}..."
            fi

            docker compose pull
            docker compose up -d --remove-orphans

            # Health check do backend: 30 tentativas x 10s = ate 5min. Omni
            # health depends-on adiciona ~3min de warmup antes do backend
            # arrancar; aqui mede so o backend ja-up.
            for i in $(seq 1 30); do
                sleep 10
                code=$(curl -fsS -o /dev/null -w "%{http_code}" https://flowertex.idlehub.com.br/health 2>/dev/null || echo "000")
                echo "attempt $i: health=$code"
                if [ "$code" = "200" ]; then
                    echo "deploy healthy"
                    exit 0
                fi
            done
            echo "health check failed — dump logs"
            docker compose logs --tail=80 backend
            docker compose logs --tail=40 omni
            exit 1
