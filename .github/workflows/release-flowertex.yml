name: Release Flowertex

on:
  push:
    branches: [main]
    paths:
      - "platform/backend/**"
      - "platform/frontend/**"
      - "observer-framework/**"
      - "deploy/hostinger/**"
      - ".github/workflows/release-flowertex.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-backend:
    name: Build + push backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          # Backend Dockerfile precisa do observer-framework/ sibling pra
          # editable dep, entao context = repo root.
          context: .
          file: ./platform/backend/Dockerfile
          push: true
          tags: |
            ghcr.io/rodrigosiliunas/flowertex-backend:${{ github.sha }}
            ghcr.io/rodrigosiliunas/flowertex-backend:main
          cache-from: type=gha,scope=flowertex-backend
          cache-to: type=gha,scope=flowertex-backend,mode=max

  build-frontend:
    name: Build + push frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: ./platform/frontend
          file: ./platform/frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/rodrigosiliunas/flowertex-frontend:${{ github.sha }}
            ghcr.io/rodrigosiliunas/flowertex-frontend:main
          cache-from: type=gha,scope=flowertex-frontend
          cache-to: type=gha,scope=flowertex-frontend,mode=max

  build-omni:
    # Omni gateway @automagik/omni — gerencia canais WhatsApp/Discord/Telegram.
    # Imagem custom porque o omni embute pgserve (postgres binarios em path
    # especifico) que precisa de setup nao-trivial. Vide platform/backend/omni.Dockerfile.
    name: Build + push omni
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: ./platform/backend
          file: ./platform/backend/omni.Dockerfile
          push: true
          tags: |
            ghcr.io/rodrigosiliunas/flowertex-omni:${{ github.sha }}
            ghcr.io/rodrigosiliunas/flowertex-omni:main
          cache-from: type=gha,scope=flowertex-omni
          cache-to: type=gha,scope=flowertex-omni,mode=max
