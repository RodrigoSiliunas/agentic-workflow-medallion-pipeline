name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  # ============================================================
  # Observer framework (reusavel, futuro repo open-source)
  # ============================================================
  observer-framework:
    name: Observer framework (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: observer-framework

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install ruff pytest pydantic pyyaml databricks-sdk
          # Providers opcionais — o CI roda testes que importam desses modulos
          pip install anthropic PyGithub openai

      - name: Lint
        run: ruff check observer scripts tests

      - name: Test
        run: pytest tests/ -v

  # ============================================================
  # Pipeline WhatsApp (consumidor do framework)
  # ============================================================
  pipeline-seguradora-whatsapp:
    name: Pipeline seguradora WhatsApp (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pipelines/pipeline-seguradora-whatsapp

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install ruff pytest pydantic databricks-sdk
          # Deps usadas pelo pipeline_lib (storage S3)
          pip install boto3 pandas pyarrow

      - name: Lint (pipeline_lib + tests)
        run: ruff check pipeline_lib deploy tests

      - name: Lint notebooks (T6)
        working-directory: ${{ github.workspace }}
        run: python scripts/lint_notebooks.py "pipelines/pipeline-seguradora-whatsapp/notebooks/**/*.py"

      - name: Test pipeline
        run: pytest tests/ -v

      - name: Test notebook linter
        working-directory: ${{ github.workspace }}
        run: pytest tests/test_lint_notebooks.py -v

  # ============================================================
  # Platform Backend (FastAPI + Postgres)
  # ============================================================
  platform-backend:
    name: Platform backend (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform/backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: flowertex_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/flowertex_test
      SECRET_KEY: ci-test-key-not-for-production-use-only
      ENCRYPTION_KEY: 8_8p1OjQt4hOPruM--cRAMB96jsqc5dyesgD8ITNzLI=
      SAGA_RUNNER: mock

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint
        run: uv run ruff check app/ tests/

      - name: Test (unit)
        run: uv run pytest tests/unit/ -v

      - name: Test (integration)
        run: uv run pytest tests/integration/ -v

  # ============================================================
  # Platform Frontend (Nuxt 4 lint)
  # ============================================================
  platform-frontend:
    name: Platform frontend (lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform/frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Lint
        run: bunx eslint app/

  # ============================================================
  # Validacao extra para PRs do agente AI (branches fix/* ou feat/*)
  # ============================================================
  validate-agent-pr:
    name: Validate agent-generated PR
    runs-on: ubuntu-latest
    if: startsWith(github.head_ref, 'fix/') || startsWith(github.head_ref, 'feat/')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install ruff pytest pydantic pyyaml databricks-sdk
          pip install anthropic PyGithub openai
          pip install boto3 pandas pyarrow

      - name: Observer lint + test
        working-directory: observer-framework
        run: |
          ruff check observer scripts tests
          pytest tests/ -v

      - name: Pipeline lint + test
        working-directory: pipelines/pipeline-seguradora-whatsapp
        run: |
          ruff check pipeline_lib deploy tests
          pytest tests/ -v
