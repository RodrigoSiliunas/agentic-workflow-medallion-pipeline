name: Observer Feedback Loop

# Atualiza a tabela medallion.observer.diagnostics quando um PR criado
# automaticamente pelo Observer Agent eh mergeado ou fechado sem merge.
# Fecha o loop de feedback: taxa de merge, tempo medio de resolucao etc
# viram queryable pelo dashboard SQL.

on:
  pull_request:
    types: [closed]

jobs:
  update-diagnostics:
    # So roda para PRs criados pelo Observer (branch fix/agent-auto-*)
    if: startsWith(github.event.pull_request.head.ref, 'fix/agent-auto-')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install databricks-sdk
        run: pip install databricks-sdk

      - name: Determine PR status
        id: status
        run: |
          if [ "${{ github.event.pull_request.merged }}" = "true" ]; then
            echo "status=merged" >> "$GITHUB_OUTPUT"
          else
            echo "status=closed" >> "$GITHUB_OUTPUT"
          fi

      - name: Update observer.diagnostics
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          PIPELINE_CATALOG: medallion
        run: |
          python observer-framework/scripts/update_pr_feedback.py \
            --pr-number ${{ github.event.pull_request.number }} \
            --status ${{ steps.status.outputs.status }}

      # Sync arquivos do PR mergeado pro workspace Databricks.
      # Saga deploy popula /Shared/flowertex/... so uma vez (no deploy inicial).
      # Sem isso, fix do Observer fica no git mas workspace mantem versao
      # quebrada que o user editou manualmente via Databricks UI.
      - name: List PR files
        if: steps.status.outputs.status == 'merged'
        id: prfiles
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Filtra pra paths sincaveis: pipelines/ e observer-framework/.
          # Bloqueia .github/, infra/, platform/, etc — nao tem analogo no
          # workspace e poderia sobrescrever coisa errada.
          files=$(gh pr view ${{ github.event.pull_request.number }} \
            --json files --jq '.files[].path' \
            | grep -E '^(pipelines/|observer-framework/(observer/|notebooks/))' \
            || true)
          if [ -z "$files" ]; then
            echo "files=" >> "$GITHUB_OUTPUT"
            echo "Nenhum arquivo sincavel — skip workspace sync." >> "$GITHUB_STEP_SUMMARY"
          else
            # Multiline output via heredoc
            {
              echo "files<<EOF"
              echo "$files"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Sync Databricks workspace
        if: steps.status.outputs.status == 'merged' && steps.prfiles.outputs.files != ''
        uses: appleboy/ssh-action@v1.2.0
        env:
          PR_FILES: ${{ steps.prfiles.outputs.files }}
          SAGA_USER_EMAIL: administrator@idlehub.com.br
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          timeout: 60s
          command_timeout: 5m
          envs: PR_FILES,SAGA_USER_EMAIL
          script: |
            set -euo pipefail
            cd /opt/flowertex
            REPO_BASE="/Shared/flowertex/agentic-workflow-medallion-pipeline"
            while IFS= read -r src; do
              [ -z "$src" ] && continue
              # Notebooks Databricks (qualquer .py em pasta notebooks/)
              # uploadam sem extensao — workspace identifica como notebook.
              # Outros arquivos uploadam com extensao igual ao git.
              if echo "$src" | grep -qE '/notebooks/.*\.py$'; then
                dst="$REPO_BASE/${src%.py}"
              else
                dst="$REPO_BASE/$src"
              fi
              echo "==> $src -> $dst"
              docker exec -w /app/platform/backend -e PYTHONPATH=/app/platform/backend \
                flowertex-backend \
                uv run python scripts/vps_upload_workspace_file.py \
                --user-email "$SAGA_USER_EMAIL" \
                --source-path "$src" \
                --workspace-path "$dst"
            done <<EOF
            $PR_FILES
            EOF

      - name: Summary
        run: |
          echo "## Observer Feedback Loop" >> "$GITHUB_STEP_SUMMARY"
          echo "- PR #${{ github.event.pull_request.number }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Branch: \`${{ github.event.pull_request.head.ref }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Status: **${{ steps.status.outputs.status }}**" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tabela atualizada: \`medallion.observer.diagnostics\`" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.status.outputs.status }}" = "merged" ]; then
            echo "- Workspace Databricks sincronizado (Shared/flowertex/...)." >> "$GITHUB_STEP_SUMMARY"
          fi
