# Vhost do flowertex.idlehub.com.br no nginx-proxy global do Hostinger.
# Espelha o padrao de /opt/nginx-proxy/conf.d/idlehub.conf.
#
# Instalacao: copiar pra /opt/nginx-proxy/conf.d/flowertex.conf e
# `docker exec nginx-proxy nginx -t && docker exec nginx-proxy nginx -s reload`.
#
# Cert emitido pelo certbot-global via --webroot (ver bootstrap.sh).

upstream flowertex_frontend {
    server flowertex-frontend:3000;
}

upstream flowertex_backend {
    server flowertex-backend:8000;
}

server {
    listen 80;
    server_name flowertex.idlehub.com.br;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name flowertex.idlehub.com.br;

    ssl_certificate /etc/letsencrypt/live/flowertex.idlehub.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/flowertex.idlehub.com.br/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    server_tokens off;

    client_max_body_size 50M;

    # Health check direto no backend
    location = /health {
        proxy_pass http://flowertex_backend/health;
        access_log off;
    }

    # API FastAPI — buffering off pra suportar SSE (chat streaming)
    location /api/ {
        proxy_pass http://flowertex_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Frontend Nuxt SSR
    location / {
        proxy_pass http://flowertex_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
