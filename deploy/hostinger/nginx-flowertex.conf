# Vhost do flowertex.idlehub.com.br no nginx-proxy global do Hostinger.
# Espelha o padrao de /opt/nginx-proxy/conf.d/idlehub.conf, com uma diferenca:
# usa `resolver 127.0.0.11 + set $var + proxy_pass $var` ao inves de blocos
# upstream estaticos — isso deferra a resolucao DNS pra request-time, permitindo
# carregar o vhost mesmo quando os containers `flowertex-{backend,frontend}` nao
# existirem (que e o caso no primeiro bootstrap, antes do release workflow buildar
# as imagens). Vhost com upstream estatico falharia em `nginx -t` nesse momento.
#
# Instalacao: copiar pra /opt/nginx-proxy/conf.d/flowertex.conf e
# `docker exec nginx-proxy nginx -t && docker exec nginx-proxy nginx -s reload`.
#
# Cert emitido pelo certbot-global via --webroot (ver bootstrap.sh).

server {
    listen 80;
    server_name flowertex.idlehub.com.br;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name flowertex.idlehub.com.br;

    ssl_certificate /etc/letsencrypt/live/flowertex.idlehub.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/flowertex.idlehub.com.br/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    server_tokens off;

    client_max_body_size 50M;

    # Docker embedded DNS — defere resolucao dos upstreams pra request-time
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Health check direto no backend
    location = /health {
        set $backend "http://flowertex-backend:8000";
        proxy_pass $backend/health;
        access_log off;
    }

    # API FastAPI — buffering off pra suportar SSE (chat streaming)
    location /api/ {
        set $backend "http://flowertex-backend:8000";
        proxy_pass $backend$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Frontend Nuxt SSR
    location / {
        set $frontend "http://flowertex-frontend:3000";
        proxy_pass $frontend$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
